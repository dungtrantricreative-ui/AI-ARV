[asr_service]
provider = "groq"
base_url = "https://api.groq.com"
model = "whisper-large-v3"
# DÁN KEY THẬT VÀO ĐÂY (để trống "" nếu muốn lấy từ biến môi trường GROQ_API_KEY)
api_key = ""

[llm_service]
# Cerebras dùng OpenAI-compatible API → provider = "openai"
provider = "openai"
base_url = "https://api.cerebras.ai/v1"
model = "gemma-4-31b"
# DÁN KEY THẬT VÀO ĐÂY (để trống "" nếu muốn lấy từ biến môi trường OPENAI_API_KEY)
api_key = ""

[tts_service]
provider = "edge"
voice_vi = "vi-VN-HoaiMyNeural"

[scene_detect]
method = "interval"
threshold = 27.0
min_duration = 1.5
interval_seconds = 5.0
output_format = "json"
